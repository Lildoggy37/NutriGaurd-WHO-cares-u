services:
  redis:
    image: redis/redis-stack:latest
    container_name: nutriguard-redis
    ports:
      - "6379:6379"
      - "8001:8001"  # RedisInsight
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    container_name: nutriguard-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - DB_PATH=/app/data/nutriguard.db
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - HF_ENDPOINT=${HF_ENDPOINT:-https://huggingface.co}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-NutriGuard}
    volumes:
      # 本地模型文件挂载（避免每次构建复制 ~3GB 模型）
      - ./models:/app/models:ro
      # SQLite 数据库持久化
      - db_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  db_data:
